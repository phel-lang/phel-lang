# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: Tests

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  compiler-tests:
    name: Compiler tests on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.4', '8.5' ]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-phel
        with:
          php-version: ${{ matrix.php }}

      - name: Run unit tests to the compiler itself
        run: vendor/bin/phpunit --testsuite unit

      - name: Run integration tests to the compiler itself
        run: vendor/bin/phpunit --testsuite integration

  core-tests:
    name: Core tests on PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.4', '8.5' ]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-phel
        with:
          php-version: ${{ matrix.php }}

      - name: Run tests to the core library
        run: composer run-script test-core

  bench-tests:
    name: Bench tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-phel

      - name: Run PHPBench
        run: vendor/bin/phpbench run --iterations=3 --warmup=1 --report=aggregate

  bash-tests:
    name: Bash tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-phel

      - name: Run Bashunit tests
        run: tools/bashunit tools/*-test.sh --simple

  symfony-console-7-compat:
    name: Compat tests on symfony/console ^7.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-phel

      - name: Pin symfony/console to ^7.0 for this run
        run: composer update --with "symfony/console:^7.0" --with-all-dependencies --no-interaction --no-ansi --no-progress

      - name: Run core tests
        run: composer run-script test-core

      - name: Run compiler integration tests
        run: php -d memory_limit=2G vendor/bin/phpunit --testsuite=integration
