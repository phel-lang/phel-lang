name: clojure-test-suite

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      suite-ref:
        description: 'Ref of phel-lang/clojure-test-suite to run (blank = pinned SHA on PR/push, main on the nightly schedule)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: clojure-test-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run-clojure-test-suite:
    name: Run clojure-test-suite (PHP 8.4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout phel-lang
        uses: actions/checkout@v6
        with:
          path: phel

      - name: Checkout clojure-test-suite
        uses: actions/checkout@v6
        with:
          repository: phel-lang/clojure-test-suite
          # PR/push runs gate against a pinned, reproducible suite commit; the
          # nightly cron tracks `main` to surface upstream drift; dispatch can
          # override either way.
          ref: ${{ github.event.inputs.suite-ref || (github.event_name == 'schedule' && 'main' || '7d3db18b7d55abcae3411dcfdede99049f1bfe8a') }}
          path: clojure-test-suite

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none
          tools: composer

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-suite-${{ hashFiles('clojure-test-suite/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-suite-

      - name: Point suite at local Phel checkout
        working-directory: clojure-test-suite
        run: |
          composer config repositories.phel-local path ../phel
          composer config minimum-stability dev
          composer config prefer-stable true
          composer require --no-update phel-lang/phel-lang:@dev

      - name: Install suite dependencies
        working-directory: clojure-test-suite
        run: composer update --no-interaction --no-ansi --no-progress

      - name: Run clojure-test-suite
        working-directory: clojure-test-suite
        run: composer test
