name: Announce release draft

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.40.0)'
        required: true

permissions:
  contents: read

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node --test scripts/announce-release/*.test.mjs

      - name: Build thread draft
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node scripts/announce-release.mjs

      - name: Upload thread draft
        uses: actions/upload-artifact@v4
        with:
          name: thread-${{ github.event.release.tag_name || inputs.tag }}
          path: |
            thread.md
            thread.json
          if-no-files-found: error
